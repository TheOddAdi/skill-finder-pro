<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Narwal Skills Directory</title>
  <link rel="icon" href="/src/img/narwal logo.png" />
  <meta name="description"
    content="Search coworkers by skill, role, or department. Internal directory for finding expertise across teams." />
  <link rel="stylesheet" href="/public/style.css" />
</head>

<body>
  <!-- App root: views are swapped by script.js -->
  <div id="app">
    <!-- SEARCH VIEW -->
    <main id="search-view" class="view view--active" aria-label="Search directory">
      <header class="hero">
        <h1 class="hero__title">Find the right expert, fast.</h1>
        <p class="hero__sub">
          Search coworkers by skill, name, role, or department
        </p>
      </header>

      <!-- Sticky search bar -->
      <div class="searchbar-wrap">
        <div class="searchbar">
          <svg viewBox="0 0 24 24" width="20" height="20" class="searchbar__icon" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" />
          </svg>
          <input id="search-input" type="search" placeholder='Try "Python", "UX Research", "Financial Modeling"…'
            aria-label="Search by skill, name, role, or department" autocomplete="off" />
          <button id="clear-btn" class="clear-btn" hidden>Clear</button>
        </div>
        <div class="searchbar-meta">
          <p id="result-count" class="result-count">0 people found</p>
          <button id="add-btn" class="btn btn--primary btn--add" type="button">+ Add person</button>
        </div>
      </div>

      <!-- Results grid (populated by script.js) -->
      <section id="results" class="grid" aria-label="Employee results"></section>

      <!-- Empty state (hidden by default) -->
      <div id="empty" class="empty" hidden>
        <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" />
        </svg>
        <h2>No matches</h2>
        <p id="empty-text">Try a broader skill or check spelling.</p>
      </div>
    </main>

    <!-- PROFILE VIEW (populated and shown by script.js) -->
    <section id="profile-view" class="view" aria-label="Employee profile" hidden></section>
  </div>

  <!-- ADD PERSON MODAL -->
  <div id="add-modal" class="modal" hidden aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
      <header class="modal__head">
        <h2 id="add-modal-title">Add a person</h2>
        <button class="modal__close" type="button" data-close aria-label="Close">×</button>
      </header>
      <form id="add-form" class="form" novalidate>
        <div class="form__grid">
          <label class="field">
            <span>Full name *</span>
            <input name="full_name" type="text" required maxlength="120" />
          </label>
          <label class="field">
            <span>Role *</span>
            <input name="role" type="text" required maxlength="120" />
          </label>
          <label class="field">
            <span>Department</span>
            <input name="department" type="text" maxlength="80" />
          </label>
          <label class="field">
            <span>Rank / Seniority</span>
            <input name="rank" type="text" maxlength="80" placeholder="e.g. Senior, Lead" />
          </label>
          <label class="field field--full">
            <span>Skills (comma separated) *</span>
            <input name="skills" type="text" required placeholder="Python, SQL, Tableau" />
          </label>
          <label class="field field--full">
            <span>Bio</span>
            <textarea name="bio" rows="3" maxlength="600"></textarea>
          </label>
          <label class="field field--full">
            <span>LinkedIn URL</span>
            <input name="linkedin_url" type="url" placeholder="https://linkedin.com/in/…" />
          </label>
          <label class="field field--full">
            <span>Resume (PDF only)</span>
            <input name="resume" type="file" accept="application/pdf" />
          </label>
        </div>
        <p class="form__error" id="add-error" hidden></p>
        <footer class="form__actions">
          <button type="button" class="btn btn--ghost" data-close>Cancel</button>
          <button type="submit" class="btn btn--primary" id="add-submit">Add person</button>
        </footer>
      </form>
    </div>
  </div>

  <script type="module" src="/public/script.js"></script>
</body>

</html>
